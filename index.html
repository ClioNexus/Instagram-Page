<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram - Odea's Pub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #fafafa; color: #262626; }
        
        /* Header Instagram */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; font-weight: bold; font-size: 16px; }
        
        /* Sezione Profilo */
        .profile-container { padding: 20px 15px; background: #fff; border-bottom: 1px solid #dbdbdb; }
        .profile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .story-ring {
            width: 86px; height: 86px; border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .profile-pic { width: 78px; height: 78px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .stats { display: flex; gap: 20px; text-align: center; }
        .stats div span { display: block; font-weight: bold; font-size: 16px; }
        .stats div { font-size: 13px; }
        .bio { font-size: 14px; line-height: 1.4; }
        .bio strong { font-weight: 600; }
        .btn-follow { display: block; width: 100%; text-align: center; background: #0095f6; color: #fff; padding: 7px 0; border-radius: 8px; font-weight: 600; font-size: 14px; margin-top: 15px; text-decoration: none; }
        
        /* Griglia Post (Finti) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Interfaccia Storia */
        #story-view {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1000; flex-direction: column; justify-content: center;
        }
        .progress-container { width: 100%; padding: 10px; display: flex; position: absolute; top: 0; z-index: 1001; }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex-grow: 1; border-radius: 2px; margin: 0 2px; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; }
        .story-header { position: absolute; top: 20px; left: 15px; display: flex; align-items: center; z-index: 1001; }
        .story-header img { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; }
        .story-header span { color: #fff; font-weight: 600; font-size: 14px; text-shadow: 1px 1px 2px #000; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 24px; z-index: 1001; cursor: pointer; text-shadow: 1px 1px 2px #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <span>odeas_pub</span>
        <span>≡</span>
    </div>

    <div class="profile-container">
        <div class="profile-top">
            <div class="story-ring" onclick="openStory()">
                <img class="profile-pic" src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80" alt="Odea's">
            </div>
            <div class="stats">
                <div><span>142</span>Post</div>
                <div><span>3.2M</span>Follower</div>
                <div><span>150</span>Seguiti</div>
            </div>
        </div>
        <div class="bio">
            <strong>Odea's Pub ☘️</strong><br>
            🍔 Burger, Pizze & Irish Vibes<br>
            🍺 Beergarden ghiacciata sempre pronta<br>
            📍 Celadina, Bergamo
        </div>
        <a href="#" class="btn-follow">Segui</a>
    </div>

    <div class="grid">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
        <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
        <img src="https://images.unsplash.com/photo-1555658636-6e4a36210b15?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
        <img src="https://images.unsplash.com/photo-1513309914637-65c20a5962e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
        <img src="https://images.unsplash.com/photo-1590947132387-155cc02f3212?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
        <img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80">
    </div>

    <div id="story-view">
        <div class="progress-container"><div class="progress-bar"><div class="progress-fill" id="progress"></div></div></div>
        <div class="story-header">
            <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80">
            <span>odeas_pub</span>
        </div>
        <div class="close-btn" onclick="closeStory()">✖</div>
        
        <video id="story-video" src="stories.mp4" playsinline></video>
    </div>

    <script>
        const storyView = document.getElementById('story-view');
        const video = document.getElementById('story-video');
        const progressFill = document.getElementById('progress');

        function openStory() {
            storyView.style.display = 'flex';
            video.currentTime = 0;
            video.play();
        }

        function closeStory() {
            storyView.style.display = 'none';
            video.pause();
        }

        video.addEventListener('timeupdate', () => {
            if (video.duration) { progressFill.style.width = (video.currentTime / video.duration) * 100 + '%'; }
        });
        video.addEventListener('ended', closeStory);
    </script>
</body>
</html>
